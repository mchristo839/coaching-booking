# /etc/logrotate.d/mca — optional logrotate config
# Alternative to the inline log rotation in the scripts.
# If you install this, the scripts' built-in rotation still
# works safely alongside it (they just check file size).

/var/log/mca/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 644 root root
}
